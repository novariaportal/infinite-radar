<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Tracker</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
  <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />
</head>
<body class="mode-ife">
  <div id="ui">
    <div class="panel">
      <h1>Infinite Flight EX3 Tracker</h1>
      <div class="row">
        <label>API Key</label>
        <input id="apiKeyInput" type="password" placeholder="Enter Infinite Flight API key" />
      </div>

      <div class="row">
        <label>Server</label>
        <select id="serverSelect">
          <option value="">Select server</option>
        </select>
      </div>

      <div class="row actions">
        <button id="connectBtn">Connect</button>
        <button id="modeBtn">Switch to Radar</button>
      </div>

      <div id="status">Idle</div>
    </div>

    <div class="hud" id="hud">
      <div>Callsign: <span id="hudCallsign">-</span></div>
      <div>ALT: <span id="hudAlt">-</span> ft</div>
      <div>SPD: <span id="hudSpd">-</span> kts</div>
      <div>HDG: <span id="hudHdg">-</span>°</div>
    </div>
  </div>

  <div id="cesiumContainer"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
